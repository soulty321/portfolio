<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <!-- TO-BE: Focus on name tag -->
  <text x="200" y="28" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="2">TO-BE</text>

  <!-- One large focused product -->
  <rect x="124" y="50" width="152" height="130" rx="12" fill="#111111"/>
  <text x="200" y="106" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">🏷 네임택</text>
  <text x="200" y="126" font-family="'Inter', sans-serif" font-size="11" fill="#aaaaaa" text-anchor="middle">Name Tag</text>
  <text x="200" y="148" font-family="'Inter', sans-serif" font-size="20" font-weight="800" fill="#37A3E2" text-anchor="middle">82.7%</text>
  <text x="200" y="166" font-family="'Inter', sans-serif" font-size="10" fill="#aaaaaa" text-anchor="middle">이익 기여도</text>

  <!-- Small secondary products -->
  <rect x="30" y="100" width="80" height="50" rx="8" fill="#F9F9F9" stroke="#E5E7EB" stroke-width="1.5" opacity="0.6"/>
  <text x="70" y="124" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">명함(B2B)</text>
  <text x="70" y="138" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">47.3%</text>
  <rect x="290" y="100" width="80" height="50" rx="8" fill="#F9F9F9" stroke="#E5E7EB" stroke-width="1.5" opacity="0.6"/>
  <text x="330" y="124" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">기타</text>

  <!-- Result label -->
  <rect x="60" y="200" width="280" height="50" rx="8" fill="#F0F9FF" stroke="#37A3E2" stroke-width="1.5"/>
  <text x="200" y="222" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">✓ Cash Cow 집중 전략</text>
  <text x="200" y="240" font-family="'Inter', sans-serif" font-size="11" fill="#555555" text-anchor="middle">51.25% 마진율 · 브랜드 프리미엄 확보</text>
