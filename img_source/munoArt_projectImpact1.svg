<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 562 315" width="562" height="315">
  <!-- Revenue bar chart: 2018 → 2019 growth -->
  <text x="281" y="28" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="2">REVENUE GROWTH</text>

  <!-- Axes -->
  <line x1="80" y1="40" x2="80" y2="240" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="500" y2="240" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Grid -->
  <line x1="80" y1="80" x2="500" y2="80" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="80" y1="120" x2="500" y2="120" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="80" y1="160" x2="500" y2="160" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="80" y1="200" x2="500" y2="200" stroke="#F5F5F5" stroke-width="1"/>
  <text x="72" y="83" font-family="'Inter', sans-serif" font-size="9" fill="#aaaaaa" text-anchor="end">400만</text>
  <text x="72" y="123" font-family="'Inter', sans-serif" font-size="9" fill="#aaaaaa" text-anchor="end">300만</text>
  <text x="72" y="163" font-family="'Inter', sans-serif" font-size="9" fill="#aaaaaa" text-anchor="end">200만</text>
  <text x="72" y="203" font-family="'Inter', sans-serif" font-size="9" fill="#aaaaaa" text-anchor="end">100만</text>

  <!-- 2018 bar: 190만 (height ~95/400 * 160 = 76) -->
  <rect x="130" y="164" width="80" height="76" rx="4" fill="#E5E7EB"/>
  <text x="170" y="155" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#555555" text-anchor="middle">190만원</text>
  <text x="170" y="258" font-family="'Inter', sans-serif" font-size="12" fill="#555555" text-anchor="middle">2018</text>

  <!-- 2019 bar: 328만 (height ~328/400 * 160 = 131) -->
  <rect x="310" y="109" width="80" height="131" rx="4" fill="#111111"/>
  <text x="350" y="100" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">328만원</text>
  <text x="350" y="258" font-family="'Inter', sans-serif" font-size="12" fill="#555555" text-anchor="middle">2019</text>

  <!-- Growth arrow -->
  <line x1="215" y1="164" x2="305" y2="115" stroke="#37A3E2" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="305,115 295,108 310,105" fill="#37A3E2"/>

  <!-- +72.5% badge -->
  <rect x="222" y="118" width="78" height="28" rx="14" fill="#37A3E2"/>
  <text x="261" y="136" font-family="'Inter', sans-serif" font-size="13" font-weight="800" fill="white" text-anchor="middle">+72.5%</text>

  <!-- Footer note -->
  <text x="281" y="290" font-family="'Inter', sans-serif" font-size="10" fill="#aaaaaa" text-anchor="middle">바이럴 구간(2018-2019) 연 매출 성장률 — Quantum Jump</text>
</svg>
