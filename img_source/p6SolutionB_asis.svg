<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <!-- AS-IS: Multi-product, high inventory risk -->
  <text x="200" y="28" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="2">AS-IS</text>

  <!-- Many small product boxes (scattered) -->
  <g opacity="0.8">
    <rect x="30" y="55" width="52" height="52" rx="6" fill="#F0F0F0" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="56" y="84" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">상품 A</text>
    <rect x="100" y="55" width="52" height="52" rx="6" fill="#F0F0F0" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="126" y="84" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">상품 B</text>
    <rect x="170" y="55" width="52" height="52" rx="6" fill="#F0F0F0" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="196" y="84" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">상품 C</text>
    <rect x="240" y="55" width="52" height="52" rx="6" fill="#F0F0F0" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="266" y="84" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">상품 D</text>
    <rect x="310" y="55" width="52" height="52" rx="6" fill="#F0F0F0" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="336" y="84" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">상품 E</text>
    <rect x="65" y="120" width="52" height="52" rx="6" fill="#F0F0F0" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="91" y="149" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">상품 F</text>
    <rect x="135" y="120" width="52" height="52" rx="6" fill="#F0F0F0" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="161" y="149" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">상품 G</text>
    <rect x="205" y="120" width="52" height="52" rx="6" fill="#F0F0F0" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="231" y="149" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">상품 H</text>
    <rect x="275" y="120" width="52" height="52" rx="6" fill="#F0F0F0" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="301" y="149" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">상품 I</text>
  </g>

  <!-- Risk label -->
  <rect x="80" y="198" width="240" height="50" rx="8" fill="#FFF3F3" stroke="#FFCCCC" stroke-width="1.5"/>
  <text x="200" y="220" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#CC4444" text-anchor="middle">⚠ 다품종 소량 생산</text>
  <text x="200" y="238" font-family="'Inter', sans-serif" font-size="11" fill="#888888" text-anchor="middle">높은 재고 리스크 · 분산된 마케팅 자원</text>
</svg>
