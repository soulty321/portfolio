<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 562 315" width="562" height="315">
  <!-- Title -->
  <text x="281" y="28" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="2">USAGE LOG — ADOPTION CURVE</text>

  <!-- Axes -->
  <line x1="80" y1="45" x2="80" y2="230" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="80" y1="230" x2="510" y2="230" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="72" y="60" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="end">High</text>
  <text x="72" y="105" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="end">Med</text>
  <text x="72" y="150" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="end">Low</text>
  <text x="72" y="195" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="end">Nil</text>

  <!-- Grid lines -->
  <line x1="80" y1="60" x2="510" y2="60" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="80" y1="105" x2="510" y2="105" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="80" y1="150" x2="510" y2="150" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="80" y1="195" x2="510" y2="195" stroke="#F5F5F5" stroke-width="1"/>

  <!-- X-axis labels: months -->
  <text x="120" y="246" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">출시</text>
  <text x="200" y="246" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">1개월</text>
  <text x="290" y="246" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">2개월</text>
  <text x="380" y="246" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">3개월</text>
  <text x="470" y="246" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">4개월</text>

  <!-- Usage curve (upward trend) -->
  <polyline
    points="120,210 160,198 200,185 240,168 280,148 320,122 360,96 400,75 440,62 480,54"
    fill="none" stroke="#3366CC" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Area fill under curve -->
  <polygon
    points="120,210 160,198 200,185 240,168 280,148 320,122 360,96 400,75 440,62 480,54 480,230 120,230"
    fill="#3366CC" opacity="0.06"/>

  <!-- Data point dots -->
  <circle cx="120" cy="210" r="4" fill="#3366CC"/>
  <circle cx="200" cy="185" r="4" fill="#3366CC"/>
  <circle cx="290" cy="148" r="4" fill="#3366CC"/>
  <circle cx="380" cy="96" r="4" fill="#3366CC"/>
  <circle cx="480" cy="54" r="5" fill="#3366CC"/>

  <!-- Highlight: latest point annotation -->
  <rect x="424" y="36" width="100" height="26" rx="6" fill="#3366CC"/>
  <text x="474" y="53" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">사용량 우상향</text>
  <line x1="480" y1="62" x2="480" y2="54" stroke="#3366CC" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Launch annotation -->
  <rect x="88" y="192" width="90" height="22" rx="4" fill="#F0F5FF" stroke="#CCDDFF" stroke-width="1"/>
  <text x="133" y="207" font-family="'Inter', sans-serif" font-size="8" fill="#3366CC" text-anchor="middle">Hubble 출시</text>

  <!-- Legend -->
  <line x1="90" y1="275" x2="110" y2="275" stroke="#3366CC" stroke-width="2"/>
  <circle cx="100" cy="275" r="3" fill="#3366CC"/>
  <text x="116" y="279" font-family="'Inter', sans-serif" font-size="9" fill="#555555">AI 사이드바 일간 사용량</text>
  <text x="281" y="297" font-family="'Inter', sans-serif" font-size="9" fill="#AAAAAA" text-anchor="middle">엑셀 다운로드 없이 화면에서 즉시 액션 아이템 도출 — 긍정적 사용자 경험 확보</text>
</svg>
