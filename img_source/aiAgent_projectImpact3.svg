<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 562 315" width="562" height="315">
  <!-- Title -->
  <text x="281" y="28" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="2">TOKEN OPTIMIZATION STRATEGY</text>

  <!-- Problem: Truncation -->
  <g transform="translate(30, 46)">
    <text x="240" y="0" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#CC3333" text-anchor="middle">문제: Truncation (답변 잘림)</text>

    <rect x="30" y="12" width="420" height="48" rx="8" fill="#FFF0F0" stroke="#FFCCCC" stroke-width="1"/>
    <text x="50" y="34" font-family="'Inter', sans-serif" font-size="9" fill="#CC3333">90,000+ 토큰을 단일 호출로 전송 → LLM 출력 한계 초과 →</text>
    <text x="50" y="50" font-family="'Inter', sans-serif" font-size="9" fill="#CC3333">답변이 중간에 잘리는 Truncation 이슈 발생 (V0.2 단계에서 확인)</text>
  </g>

  <!-- Arrow down -->
  <line x1="281" y1="118" x2="281" y2="138" stroke="#888888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="281,142 276,135 286,135" fill="#888888"/>
  <text x="281" y="133" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">해결 전략</text>

  <!-- Solution: Split calls -->
  <g transform="translate(30, 150)">
    <text x="240" y="0" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#3366CC" text-anchor="middle">해결: 분석용 / 요약용 호출 분리</text>

    <!-- Call 1: Analysis -->
    <rect x="10" y="14" width="190" height="90" rx="10" fill="#F0F5FF" stroke="#CCDDFF" stroke-width="1.5"/>
    <text x="105" y="36" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#3366CC" text-anchor="middle">① 분석용 호출</text>
    <text x="105" y="54" font-family="'Inter', sans-serif" font-size="9" fill="#444444" text-anchor="middle">전체 키워드 데이터 전송</text>
    <text x="105" y="70" font-family="'Inter', sans-serif" font-size="9" fill="#444444" text-anchor="middle">구조 파악 + TopathDual_project 추출</text>
    <text x="105" y="86" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">긴 입력 / 짧은 출력 설계</text>
    <text x="105" y="98" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">max_output_tokens: 제한</text>

    <!-- Plus sign -->
    <text x="240" y="68" font-family="'Inter', sans-serif" font-size="22" fill="#CCCCCC" text-anchor="middle">+</text>

    <!-- Call 2: Summary -->
    <rect x="280" y="14" width="190" height="90" rx="10" fill="#F0FFF4" stroke="#AADDBB" stroke-width="1.5"/>
    <text x="375" y="36" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#22AA66" text-anchor="middle">② 요약용 호출</text>
    <text x="375" y="54" font-family="'Inter', sans-serif" font-size="9" fill="#444444" text-anchor="middle">분석 결과 요약 전송</text>
    <text x="375" y="70" font-family="'Inter', sans-serif" font-size="9" fill="#444444" text-anchor="middle">전략 제안 + 브랜드 테이블</text>
    <text x="375" y="86" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">짧은 입력 / 구조적 출력 설계</text>
    <text x="375" y="98" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA" text-anchor="middle">SSE event: brand_summary</text>
  </g>

  <!-- Result -->
  <g transform="translate(30, 270)">
    <rect x="0" y="0" width="502" height="30" rx="8" fill="#111111"/>
    <text x="251" y="19" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">결과: Truncation 0건 · 안정적 품질 · 40초 완료 달성</text>
  </g>
</svg>
