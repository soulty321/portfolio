<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000014"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="480" y="36" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="3">SOLUTION B — USABILITY DESIGN &amp; QUALITY SYSTEM</text>

  <!-- Left: Accordion UI Structure -->
  <g transform="translate(30, 55)">
    <text x="195" y="0" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#3366CC" text-anchor="middle" letter-spacing="1">아코디언 UI 구조</text>

    <!-- dangen_projectbar panel mock -->
    <rect x="0" y="16" width="390" height="370" rx="12" fill="#FAFBFF" stroke="#E5E9F5" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- dangen_projectbar header -->
    <rect x="0" y="16" width="390" height="44" rx="12" fill="#111111"/>
    <rect x="0" y="40" width="390" height="20" fill="#111111"/>
    <text x="20" y="43" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="white">✦ Hubble AI  —  데이터 인사이트</text>

    <!-- Accordion item 1: OPEN -->
    <rect x="14" y="72" width="362" height="36" rx="8" fill="#F0F5FF" stroke="#CCDDFF" stroke-width="1"/>
    <text x="30" y="95" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#111111">▼  주요 검색 의도 분석</text>
    <text x="358" y="95" font-family="'Inter', sans-serif" font-size="9" fill="#AAAAAA" text-anchor="end">열림</text>

    <rect x="14" y="112" width="362" height="56" rx="0" fill="#F8FAFF"/>
    <text x="28" y="130" font-family="'Inter', sans-serif" font-size="9" fill="#444444">'나이키 운동화' 키워드 그룹의 주요 검색 의도는 <tspan font-weight="700">퍼포먼스 중심</tspan>으로</text>
    <text x="28" y="146" font-family="'Inter', sans-serif" font-size="9" fill="#444444">분류됩니다. Top 3: 나이키 런닝화(2.1M), 에어맥스 270(980K),</text>
    <text x="28" y="162" font-family="'Inter', sans-serif" font-size="9" fill="#444444">조던 1 레트로(720K) — 스포츠 퍼포먼스 + 스트리트 패션 니즈 공존.</text>

    <!-- Accordion item 2: CLOSED -->
    <rect x="14" y="172" width="362" height="36" rx="8" fill="#F5F5F5"/>
    <text x="30" y="195" font-family="'Inter', sans-serif" font-size="10" fill="#666666">▶  트렌드 변화 분석</text>

    <!-- Accordion item 3: CLOSED -->
    <rect x="14" y="212" width="362" height="36" rx="8" fill="#F5F5F5"/>
    <text x="30" y="235" font-family="'Inter', sans-serif" font-size="10" fill="#666666">▶  전략적 액션 제안</text>

    <!-- Divider -->
    <line x1="14" y1="256" x2="376" y2="256" stroke="#E5E9F5" stroke-width="1"/>

    <!-- Brand data table -->
    <text x="14" y="274" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#888888">브랜드 데이터 테이블  (event: brand_summary)</text>
    <rect x="14" y="282" width="362" height="72" rx="6" fill="white" stroke="#E5E9F5" stroke-width="1"/>
    <!-- Table header -->
    <rect x="14" y="282" width="362" height="22" rx="6" fill="#F0F5FF"/>
    <rect x="14" y="294" width="362" height="10" fill="#F0F5FF"/>
    <text x="36" y="297" font-family="'Inter', sans-serif" font-size="8" font-weight="700" fill="#3366CC">브랜드명</text>
    <text x="180" y="297" font-family="'Inter', sans-serif" font-size="8" font-weight="700" fill="#3366CC">키워드 수</text>
    <text x="290" y="297" font-family="'Inter', sans-serif" font-size="8" font-weight="700" fill="#3366CC">총 검색량</text>
    <line x1="14" y1="305" x2="376" y2="305" stroke="#E5E9F5" stroke-width="1"/>
    <text x="36" y="319" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#333">나이키</text>
    <text x="180" y="319" font-family="'Inter', sans-serif" font-size="8" fill="#333">3,863</text>
    <text x="290" y="319" font-family="'Inter', sans-serif" font-size="8" fill="#333">2,400,000</text>
    <line x1="14" y1="325" x2="376" y2="325" stroke="#F0F0F0" stroke-width="1"/>
    <text x="36" y="339" font-family="'Inter', sans-serif" font-size="8" fill="#555">아디다스</text>
    <text x="180" y="339" font-family="'Inter', sans-serif" font-size="8" fill="#555">1,240</text>
    <text x="290" y="339" font-family="'Inter', sans-serif" font-size="8" fill="#555">890,000</text>
    <line x1="14" y1="345" x2="376" y2="345" stroke="#F0F0F0" stroke-width="1"/>
    <text x="36" y="359" font-family="'Inter', sans-serif" font-size="8" fill="#555">뉴발란스</text>
    <text x="180" y="359" font-family="'Inter', sans-serif" font-size="8" fill="#555">680</text>
    <text x="290" y="359" font-family="'Inter', sans-serif" font-size="8" fill="#555">420,000</text>

    <!-- Feedback + credit tooltip -->
    <line x1="14" y1="362" x2="376" y2="362" stroke="#E5E9F5" stroke-width="1"/>
    <text x="14" y="378" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA">이 답변이 도움이 되었나요?</text>
    <rect x="154" y="366" width="50" height="22" rx="11" fill="#F0F5FF" stroke="#3366CC" stroke-width="1"/>
    <text x="179" y="381" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">👍</text>
    <rect x="212" y="366" width="50" height="22" rx="11" fill="#F5F5F5"/>
    <text x="237" y="381" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">👎</text>
    <!-- Credit tooltip -->
    <rect x="268" y="360" width="108" height="30" rx="6" fill="#333333"/>
    <polygon points="268,374 258,374 263,368" fill="#333333"/>
    <text x="322" y="374" font-family="'Inter', sans-serif" font-size="7" fill="white" text-anchor="middle">잔여 크레딧: 148/200</text>
    <text x="322" y="385" font-family="'Inter', sans-serif" font-size="7" fill="#AAAAAA" text-anchor="middle">갱신일: 4월 1일</text>
  </g>

  <!-- Right: Three detail callouts -->
  <g transform="translate(450, 55)">
    <text x="245" y="0" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="1">UX 디테일 포인트</text>

    <!-- Point 1: Accordion -->
    <rect x="0" y="18" width="470" height="90" rx="10" fill="#F0F5FF" stroke="#CCDDFF" stroke-width="1.5"/>
    <rect x="0" y="18" width="6" height="90" rx="3" fill="#3366CC"/>
    <text x="22" y="44" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#3366CC">① 아코디언 UI</text>
    <text x="22" y="62" font-family="'Inter', sans-serif" font-size="10" fill="#444444">방대한 텍스트를 섹션별로 접고 펼칠 수 있어</text>
    <text x="22" y="78" font-family="'Inter', sans-serif" font-size="10" fill="#444444">스크롤 압박 없이 필요한 정보만 즉시 확인</text>
    <text x="22" y="96" font-family="'Inter', sans-serif" font-size="9" fill="#888888">계층적 정보 구조 → 인지 부하 감소</text>

    <!-- Point 2: Brand table -->
    <rect x="0" y="124" width="470" height="90" rx="10" fill="#F0FFF4" stroke="#AADDBB" stroke-width="1.5"/>
    <rect x="0" y="124" width="6" height="90" rx="3" fill="#22AA66"/>
    <text x="22" y="150" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#22AA66">② 브랜드 데이터 테이블</text>
    <text x="22" y="168" font-family="'Inter', sans-serif" font-size="10" fill="#444444">SSE 마지막 이벤트(brand_summary)에 백엔드가 생성한</text>
    <text x="22" y="184" font-family="'Inter', sans-serif" font-size="10" fill="#444444">정량 데이터 테이블을 자동 첨부 → 신뢰도 강화</text>
    <text x="22" y="202" font-family="'Inter', sans-serif" font-size="9" fill="#888888">LLM 텍스트의 주관성을 수치 데이터로 보완</text>

    <!-- Point 3: Feedback loop -->
    <rect x="0" y="230" width="470" height="90" rx="10" fill="#FFF8F0" stroke="#FFE0AA" stroke-width="1.5"/>
    <rect x="0" y="230" width="6" height="90" rx="3" fill="#FF8C00"/>
    <text x="22" y="256" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#FF8C00">③ 피드백 루프</text>
    <text x="22" y="274" font-family="'Inter', sans-serif" font-size="10" fill="#444444">좋아요/싫어요 버튼으로 프롬프트 품질 데이터 수집</text>
    <text x="22" y="290" font-family="'Inter', sans-serif" font-size="10" fill="#444444">어드민 모니터링 → 지속적 품질 개선 사이클 구축</text>
    <text x="22" y="308" font-family="'Inter', sans-serif" font-size="9" fill="#888888">Design + Data → 서비스 품질의 자동 정제</text>

    <!-- Bottom: Credit tooltip note -->
    <rect x="0" y="336" width="470" height="50" rx="10" fill="#F9F9F9" stroke="#E5E5E5" stroke-width="1"/>
    <text x="22" y="358" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#555555">④ 크레딧 UX 충돌 방지</text>
    <text x="22" y="376" font-family="'Inter', sans-serif" font-size="9" fill="#888888">월 200회 한도 도달 시 툴팁으로 갱신일 안내 → 사용성 충돌 예방</text>
  </g>
</svg>
