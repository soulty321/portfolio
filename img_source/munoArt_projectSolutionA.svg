  <polygon points="135,315 128,326 142,324" fill="#37A3E2" opacity="0.6"/>
  <text x="480" y="392" font-family="'Inter', sans-serif" font-size="11" fill="#888888" text-anchor="middle">선순환 피드백 루프 — 구매 완료 후 다시 새로운 요청 댓글로 이어짐</text>
