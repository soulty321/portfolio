<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 700" width="800" height="700">

  <!-- Card 1: top-left (x=20, y=20, w=370, h=320) -->
  <rect x="20" y="20" width="370" height="320" rx="12" fill="#F9F9F9" stroke="#E5E7EB" stroke-width="1.5"/>
  <clipPath id="clip1">
    <path d="M 32 20 Q 20 20 20 32 L 20 280 L 390 280 L 390 32 Q 390 20 378 20 Z"/>
  </clipPath>
  <image href="munoArt_goods/munoArt_goods_01.jpg" x="20" y="20" width="370" height="260" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip1)"/>
  <text x="205" y="302" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#111111" text-anchor="middle">악기 네임택</text>
  <text x="205" y="320" font-family="'Inter', sans-serif" font-size="11" fill="#888888" text-anchor="middle">케이스에 부착하는 맞춤 굿즈</text>

  <!-- Card 2: top-right (x=410, y=20, w=370, h=320) -->
  <rect x="410" y="20" width="370" height="320" rx="12" fill="#F9F9F9" stroke="#E5E7EB" stroke-width="1.5"/>
  <clipPath id="clip2">
    <path d="M 422 20 Q 410 20 410 32 L 410 280 L 780 280 L 780 32 Q 780 20 768 20 Z"/>
  </clipPath>
  <image href="munoArt_goods/munoArt_goods_02.jpg" x="410" y="20" width="370" height="260" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip2)"/>
  <text x="595" y="302" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#111111" text-anchor="middle">커스텀 폰케이스</text>
  <text x="595" y="320" font-family="'Inter', sans-serif" font-size="11" fill="#888888" text-anchor="middle">연주자 정체성을 담은 굿즈</text>

  <!-- Card 3: bottom-left (x=20, y=360, w=370, h=320) -->
  <rect x="20" y="360" width="370" height="320" rx="12" fill="#F9F9F9" stroke="#E5E7EB" stroke-width="1.5"/>
  <clipPath id="clip3">
    <path d="M 32 360 Q 20 360 20 372 L 20 620 L 390 620 L 390 372 Q 390 360 378 360 Z"/>
  </clipPath>
  <image href="munoArt_goods/munoArt_goods_03.jpg" x="20" y="360" width="370" height="260" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip3)"/>
  <text x="205" y="642" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#111111" text-anchor="middle">음악가 명함</text>
  <text x="205" y="660" font-family="'Inter', sans-serif" font-size="11" fill="#888888" text-anchor="middle">악기 일러스트 기반 브랜딩</text>

  <!-- Card 4: bottom-right (x=410, y=360, w=370, h=320) -->
  <rect x="410" y="360" width="370" height="320" rx="12" fill="#F9F9F9" stroke="#E5E7EB" stroke-width="1.5"/>
  <clipPath id="clip4">
    <path d="M 422 360 Q 410 360 410 372 L 410 620 L 780 620 L 780 372 Q 780 360 768 360 Z"/>
  </clipPath>
  <image href="munoArt_goods/munoArt_goods_04.jpg" x="410" y="360" width="370" height="260" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip4)"/>
  <text x="595" y="642" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#111111" text-anchor="middle">비즈니스 브랜딩</text>
  <text x="595" y="660" font-family="'Inter', sans-serif" font-size="11" fill="#888888" text-anchor="middle">음악가를 위한 아이덴티티 디자인</text>

  <!-- Bottom caption -->
  <text x="400" y="692" font-family="'Inter', sans-serif" font-size="11" fill="#aaaaaa" text-anchor="middle" font-style="italic">Constant(기계적 미감) + Variable(연주자 감성) — 실제 제작 굿즈</text>

</svg>
