<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 562 315" width="562" height="315">
  <!-- Background -->
  <rect width="562" height="315" fill="#F8FAFF"/>

  <!-- Large impact typography -->
  <text x="281" y="70" font-family="'Inter', sans-serif" font-size="13" font-weight="700" fill="#888888" text-anchor="middle" letter-spacing="3">ANALYSIS TIME</text>

  <!-- Main flow: 1,000 Keywords → 1 Context → 40 Seconds -->
  <g transform="translate(20, 90)">
    <!-- Block 1 -->
    <rect x="0" y="0" width="148" height="100" rx="12" fill="#F0F5FF" stroke="#CCDDFF" stroke-width="1.5"/>
    <text x="74" y="40" font-family="'Inter', sans-serif" font-size="32" font-weight="800" fill="#3366CC" text-anchor="middle">1,000</text>
    <text x="74" y="64" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#555555" text-anchor="middle">Keywords</text>
    <text x="74" y="86" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">나이키: 3,863개</text>

    <!-- Arrow -->
    <text x="168" y="55" font-family="'Inter', sans-serif" font-size="24" fill="#CCCCCC" text-anchor="middle">→</text>

    <!-- Block 2 -->
    <rect x="188" y="0" width="148" height="100" rx="12" fill="#FFF8F0" stroke="#FFE0AA" stroke-width="1.5"/>
    <text x="262" y="40" font-family="'Inter', sans-serif" font-size="32" font-weight="800" fill="#FF8C00" text-anchor="middle">90K+</text>
    <text x="262" y="64" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#555555" text-anchor="middle">Tokens</text>
    <text x="262" y="86" font-family="'Inter', sans-serif" font-size="9" fill="#888888" text-anchor="middle">단일 컨텍스트</text>

    <!-- Arrow -->
    <text x="356" y="55" font-family="'Inter', sans-serif" font-size="24" fill="#CCCCCC" text-anchor="middle">→</text>

    <!-- Block 3: highlight -->
    <rect x="376" y="0" width="148" height="100" rx="12" fill="#111111"/>
    <text x="450" y="44" font-family="'Inter', sans-serif" font-size="44" font-weight="800" fill="white" text-anchor="middle">40</text>
    <text x="450" y="68" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#AAAAAA" text-anchor="middle">Seconds</text>
    <text x="450" y="88" font-family="'Inter', sans-serif" font-size="9" fill="#666666" text-anchor="middle">평균 분석 시간</text>
  </g>

  <!-- Sub text -->
  <text x="281" y="225" font-family="'Inter', sans-serif" font-size="11" fill="#555555" text-anchor="middle" font-weight="600">1,000 Keywords  →  1 Context  →  40 Seconds</text>

  <!-- Bottom note -->
  <text x="281" y="252" font-family="'Inter', sans-serif" font-size="10" fill="#AAAAAA" text-anchor="middle">기존 수동 분석(수 시간~수일) 대비 획기적 단축 — 나이키 3,863개 키워드 기준 40초 소요</text>

  <!-- Time comparison bar -->
  <g transform="translate(80, 268)">
    <text x="0" y="12" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA">수동 분석</text>
    <rect x="60" y="2" width="320" height="12" rx="6" fill="#FFDDDD"/>
    <text x="392" y="12" font-family="'Inter', sans-serif" font-size="8" fill="#CC3333">수 시간+</text>

    <text x="0" y="30" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA">Hubble AI</text>
    <rect x="60" y="20" width="4" height="12" rx="2" fill="#3366CC"/>
    <text x="72" y="30" font-family="'Inter', sans-serif" font-size="8" fill="#3366CC" font-weight="700">40초</text>
  </g>
</svg>
