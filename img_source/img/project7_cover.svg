<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg1" cx="30%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#E8F0FF"/>
      <stop offset="50%" stop-color="#EEF2F7"/>
      <stop offset="100%" stop-color="#E4EBF5"/>
    </radialGradient>
    <radialGradient id="bg2" cx="75%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#D0E8FF"/>
      <stop offset="100%" stop-color="#EEF2F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#00000014"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg1)"/>
  <ellipse cx="500" cy="400" rx="750" ry="620" fill="#C8D9F5" opacity="0.45" filter="url(#blur1)"/>
  <ellipse cx="1500" cy="500" rx="650" ry="520" fill="#B8D8FF" opacity="0.4" filter="url(#blur2)"/>
  <ellipse cx="1100" cy="900" rx="500" ry="320" fill="#D5E8FF" opacity="0.3" filter="url(#blur2)"/>

  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#888888"/>
    </pattern>
  </defs>
  <rect x="1380" y="550" width="520" height="420" fill="url(#dots)" opacity="0.07"/>
  <rect x="0" y="0" width="420" height="280" fill="url(#dots)" opacity="0.07"/>

  <!-- Node graph background decoration -->
  <g opacity="0.09" stroke="#3366CC" stroke-width="1.5" fill="none">
    <circle cx="1550" cy="280" r="6" fill="#3366CC" opacity="0.4"/>
    <circle cx="1680" cy="200" r="6" fill="#3366CC" opacity="0.4"/>
    <circle cx="1720" cy="340" r="6" fill="#3366CC" opacity="0.4"/>
    <circle cx="1620" cy="160" r="6" fill="#3366CC" opacity="0.4"/>
    <circle cx="1800" cy="260" r="6" fill="#3366CC" opacity="0.4"/>
    <line x1="1550" y1="280" x2="1680" y2="200"/>
    <line x1="1680" y1="200" x2="1720" y2="340"/>
    <line x1="1680" y1="200" x2="1620" y2="160"/>
    <line x1="1720" y1="340" x2="1800" y2="260"/>
    <line x1="1550" y1="280" x2="1620" y2="160"/>
    <circle cx="200" cy="820" r="5" fill="#3366CC" opacity="0.4"/>
    <circle cx="320" cy="760" r="5" fill="#3366CC" opacity="0.4"/>
    <circle cx="160" cy="720" r="5" fill="#3366CC" opacity="0.4"/>
    <circle cx="280" cy="880" r="5" fill="#3366CC" opacity="0.4"/>
    <line x1="200" y1="820" x2="320" y2="760"/>
    <line x1="320" y1="760" x2="160" y2="720"/>
    <line x1="200" y1="820" x2="280" y2="880"/>
  </g>

  <!-- Brand badge -->
  <rect x="120" y="120" width="220" height="40" rx="20" fill="#111111"/>
  <text x="230" y="145" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle" letter-spacing="2">LISTENING MIND</text>

  <!-- AI badge -->
  <rect x="356" y="120" width="100" height="40" rx="20" fill="#3366CC" opacity="0.15"/>
  <text x="406" y="145" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#3366CC" text-anchor="middle" letter-spacing="1">AI Agent</text>

  <!-- Main headline -->
  <text x="120" y="320" font-family="'Inter', sans-serif" font-size="68" font-weight="800" fill="#111111" letter-spacing="-2">흩어진 1,000개의 SEO 키워드를</text>
  <text x="120" y="410" font-family="'Inter', sans-serif" font-size="68" font-weight="800" fill="#111111" letter-spacing="-2">40초 만에 전략으로 바꾸는</text>
  <text x="120" y="500" font-family="'Inter', sans-serif" font-size="68" font-weight="800" fill="#3366CC" letter-spacing="-2">AI 에이전트 (Hubble)</text>

  <!-- Sub headline -->
  <text x="120" y="570" font-family="'Inter', sans-serif" font-size="24" fill="#555555" letter-spacing="0">9만 토큰 이상의 Raw Data를 단일 맥락으로 통합 — 리스닝마인드 AI 사이드바 구축</text>

  <!-- Impact metrics row -->
  <g transform="translate(120, 650)">
    <!-- Metric 1 -->
    <rect x="0" y="0" width="280" height="110" rx="16" fill="white" opacity="0.75" filter="url(#shadow)"/>
    <text x="140" y="48" font-family="'Inter', sans-serif" font-size="40" font-weight="800" fill="#111111" text-anchor="middle">40초</text>
    <text x="140" y="76" font-family="'Inter', sans-serif" font-size="13" fill="#888888" text-anchor="middle">최대 1,000개 키워드 분석</text>
    <rect x="0" y="0" width="6" height="110" rx="3" fill="#3366CC"/>

    <!-- Metric 2 -->
    <rect x="310" y="0" width="280" height="110" rx="16" fill="white" opacity="0.75" filter="url(#shadow)"/>
    <text x="450" y="48" font-family="'Inter', sans-serif" font-size="40" font-weight="800" fill="#111111" text-anchor="middle">90K+</text>
    <text x="450" y="76" font-family="'Inter', sans-serif" font-size="13" fill="#888888" text-anchor="middle">단일 컨텍스트 처리 토큰</text>
    <rect x="310" y="0" width="6" height="110" rx="3" fill="#3366CC"/>

    <!-- Metric 3 -->
    <rect x="620" y="0" width="280" height="110" rx="16" fill="white" opacity="0.75" filter="url(#shadow)"/>
    <text x="760" y="48" font-family="'Inter', sans-serif" font-size="40" font-weight="800" fill="#111111" text-anchor="middle">V0.1→V0.4</text>
    <text x="760" y="76" font-family="'Inter', sans-serif" font-size="13" fill="#888888" text-anchor="middle">프롬프트 고도화 단계</text>
    <rect x="620" y="0" width="6" height="110" rx="3" fill="#3366CC"/>
  </g>

  <!-- Role tags -->
  <g transform="translate(120, 810)">
    <rect x="0" y="0" width="220" height="36" rx="18" fill="#111111" opacity="0.08"/>
    <text x="110" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#333333" text-anchor="middle">Product Design (UX/UI)</text>
    <rect x="234" y="0" width="240" height="36" rx="18" fill="#111111" opacity="0.08"/>
    <text x="354" y="23" font-family="'Inter', sans-serif" font-size="13" fill="#333333" text-anchor="middle">Prompt Engineering</text>
  </g>

  <!-- Right side: AI Sidebar mockup -->
  <g transform="translate(1050, 180)" filter="url(#shadow)">
    <!-- Main screen frame -->
    <rect x="0" y="0" width="700" height="720" rx="20" fill="white" opacity="0.92"/>

    <!-- Screen top bar -->
    <rect x="0" y="0" width="700" height="52" rx="20" fill="#F5F7FA"/>
    <rect x="0" y="32" width="700" height="20" fill="#F5F7FA"/>
    <circle cx="32" cy="26" r="7" fill="#E0E0E0"/>
    <circle cx="56" cy="26" r="7" fill="#E0E0E0"/>
    <circle cx="80" cy="26" r="7" fill="#E0E0E0"/>
    <text x="350" y="31" font-family="'Inter', sans-serif" font-size="11" fill="#AAAAAA" text-anchor="middle">리스닝마인드 — 인텐트 파인더</text>

    <!-- Main content area (keyword nodes) -->
    <g transform="translate(20, 68)">
      <!-- Simulated node graph -->
      <g opacity="0.5">
        <!-- Nodes -->
        <circle cx="150" cy="160" r="28" fill="#E5E7EB"/>
        <text x="150" y="165" font-family="'Inter', sans-serif" font-size="9" fill="#666" text-anchor="middle">나이키 운동화</text>
        <circle cx="80" cy="80" r="20" fill="#E5E7EB"/>
        <text x="80" y="85" font-family="'Inter', sans-serif" font-size="8" fill="#666" text-anchor="middle">나이키</text>
        <circle cx="230" cy="90" r="22" fill="#E5E7EB"/>
        <text x="230" y="95" font-family="'Inter', sans-serif" font-size="8" fill="#666" text-anchor="middle">런닝화</text>
        <circle cx="60" cy="200" r="17" fill="#E5E7EB"/>
        <text x="60" y="205" font-family="'Inter', sans-serif" font-size="7" fill="#666" text-anchor="middle">에어맥스</text>
        <circle cx="240" cy="220" r="19" fill="#E5E7EB"/>
        <text x="240" y="225" font-family="'Inter', sans-serif" font-size="7" fill="#666" text-anchor="middle">조던</text>
        <circle cx="300" cy="150" r="15" fill="#E5E7EB"/>
        <circle cx="130" cy="280" r="14" fill="#E5E7EB"/>
        <circle cx="200" cy="300" r="12" fill="#E5E7EB"/>
        <!-- Lines -->
        <line x1="150" y1="160" x2="80" y2="80" stroke="#CCCCCC" stroke-width="1"/>
        <line x1="150" y1="160" x2="230" y2="90" stroke="#CCCCCC" stroke-width="1"/>
        <line x1="150" y1="160" x2="60" y2="200" stroke="#CCCCCC" stroke-width="1"/>
        <line x1="150" y1="160" x2="240" y2="220" stroke="#CCCCCC" stroke-width="1"/>
        <line x1="150" y1="160" x2="300" y2="150" stroke="#CCCCCC" stroke-width="1"/>
        <line x1="150" y1="160" x2="130" y2="280" stroke="#CCCCCC" stroke-width="1"/>
        <line x1="150" y1="160" x2="200" y2="300" stroke="#CCCCCC" stroke-width="1"/>
      </g>
    </g>

    <!-- AI Sidebar panel -->
    <rect x="360" y="52" width="320" height="668" rx="0" fill="#FAFBFF"/>
    <rect x="360" y="52" width="2" height="668" fill="#E5E9F5"/>

    <!-- Sidebar header -->
    <rect x="360" y="52" width="320" height="56" fill="#111111"/>
    <text x="380" y="84" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="white">✦ Hubble AI</text>
    <text x="660" y="84" font-family="'Inter', sans-serif" font-size="20" fill="#888888" text-anchor="middle">×</text>

    <!-- Loading/streaming text simulation -->
    <g transform="translate(375, 125)">
      <text x="0" y="0" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#3366CC">📊 데이터 인사이트 분석 완료</text>

      <rect x="0" y="14" width="280" height="1" fill="#E5E9F5"/>

      <!-- Accordion item 1 open -->
      <rect x="0" y="22" width="290" height="32" rx="6" fill="#F0F4FF"/>
      <text x="10" y="42" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#111111">▼ 주요 검색 의도 분석</text>

      <text x="10" y="72" font-family="'Inter', sans-serif" font-size="9" fill="#444444">'나이키 운동화' 키워드 그룹의 주요</text>
      <text x="10" y="85" font-family="'Inter', sans-serif" font-size="9" fill="#444444">검색 의도는 <tspan font-weight="700" fill="#3366CC">퍼포먼스 중심</tspan>으로...</text>
      <text x="10" y="98" font-family="'Inter', sans-serif" font-size="9" fill="#444444">Top 3 키워드: 나이키 런닝화,</text>
      <text x="10" y="111" font-family="'Inter', sans-serif" font-size="9" fill="#444444">에어맥스 270, 조던 1 레트로</text>

      <!-- Accordion item 2 closed -->
      <rect x="0" y="124" width="290" height="32" rx="6" fill="#F5F5F5"/>
      <text x="10" y="144" font-family="'Inter', sans-serif" font-size="10" fill="#666666">▶ 트렌드 변화 분석</text>

      <!-- Accordion item 3 closed -->
      <rect x="0" y="162" width="290" height="32" rx="6" fill="#F5F5F5"/>
      <text x="10" y="182" font-family="'Inter', sans-serif" font-size="10" fill="#666666">▶ 전략적 액션 제안</text>

      <!-- Brand table -->
      <rect x="0" y="204" width="290" height="1" fill="#E5E9F5"/>
      <text x="0" y="222" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#888888">브랜드 데이터 테이블</text>
      <rect x="0" y="228" width="290" height="56" rx="6" fill="white" stroke="#E5E9F5" stroke-width="1"/>
      <text x="10" y="243" font-family="'Inter', sans-serif" font-size="8" fill="#888888">브랜드명</text>
      <text x="120" y="243" font-family="'Inter', sans-serif" font-size="8" fill="#888888">키워드 수</text>
      <text x="210" y="243" font-family="'Inter', sans-serif" font-size="8" fill="#888888">검색량</text>
      <line x1="0" y1="248" x2="290" y2="248" stroke="#F0F0F0" stroke-width="1"/>
      <text x="10" y="261" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#333333">나이키</text>
      <text x="120" y="261" font-family="'Inter', sans-serif" font-size="8" fill="#333333">3,863</text>
      <text x="210" y="261" font-family="'Inter', sans-serif" font-size="8" fill="#333333">2.4M</text>
      <line x1="0" y1="266" x2="290" y2="266" stroke="#F0F0F0" stroke-width="1"/>
      <text x="10" y="278" font-family="'Inter', sans-serif" font-size="8" fill="#555555">아디다스</text>
      <text x="120" y="278" font-family="'Inter', sans-serif" font-size="8" fill="#555555">1,240</text>
      <text x="210" y="278" font-family="'Inter', sans-serif" font-size="8" fill="#555555">890K</text>

      <!-- Feedback buttons -->
      <rect x="0" y="296" width="290" height="1" fill="#E5E9F5"/>
      <text x="0" y="314" font-family="'Inter', sans-serif" font-size="8" fill="#AAAAAA">이 답변이 도움이 되었나요?</text>
      <rect x="0" y="320" width="56" height="24" rx="12" fill="#F0F4FF" stroke="#3366CC" stroke-width="1"/>
      <text x="28" y="336" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">👍</text>
      <rect x="64" y="320" width="56" height="24" rx="12" fill="#F5F5F5"/>
      <text x="92" y="336" font-family="'Inter', sans-serif" font-size="10" text-anchor="middle">👎</text>
    </g>

    <!-- Streaming cursor blink indicator -->
    <rect x="375" y="530" width="2" height="14" rx="1" fill="#3366CC" opacity="0.7"/>
  </g>

  <!-- Impact typography overlay (bottom right) -->
  <g transform="translate(1080, 940)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="18" font-weight="800" fill="#888888" opacity="0.5" letter-spacing="4">Analysis Time</text>
    <text x="220" y="0" font-family="'Inter', sans-serif" font-size="18" font-weight="800" fill="#3366CC" opacity="0.7" letter-spacing="2">40 Secs</text>
    <text x="340" y="0" font-family="'Inter', sans-serif" font-size="18" font-weight="800" fill="#888888" opacity="0.5" letter-spacing="1"> / </text>
    <text x="366" y="0" font-family="'Inter', sans-serif" font-size="18" font-weight="800" fill="#3366CC" opacity="0.7" letter-spacing="2">1,000 Keywords</text>
    <text x="600" y="0" font-family="'Inter', sans-serif" font-size="18" font-weight="800" fill="#888888" opacity="0.5" letter-spacing="1"> Processed</text>
  </g>
</svg>
