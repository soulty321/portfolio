<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg1" cx="25%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F5E6D3"/>
      <stop offset="50%" stop-color="#EEF2F7"/>
      <stop offset="100%" stop-color="#E8EFF8"/>
    </radialGradient>
    <radialGradient id="bg2" cx="75%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#D6EAF8"/>
      <stop offset="100%" stop-color="#EEF2F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg1)"/>
  <ellipse cx="400" cy="500" rx="700" ry="600" fill="#F5E6D3" opacity="0.6" filter="url(#blur1)"/>
  <ellipse cx="1500" cy="400" rx="600" ry="500" fill="#C8E6F9" opacity="0.5" filter="url(#blur2)"/>
  <ellipse cx="1200" cy="800" rx="500" ry="350" fill="#F9D8CE" opacity="0.4" filter="url(#blur2)"/>

  <!-- Decorative musical note outlines -->
  <g opacity="0.07" fill="none" stroke="#111111" stroke-width="2">
    <circle cx="200" cy="880" r="28"/>
    <line x1="228" y1="880" x2="228" y2="780"/>
    <circle cx="320" cy="860" r="28"/>
    <line x1="348" y1="860" x2="348" y2="760"/>
    <circle cx="1700" cy="200" r="22"/>
    <line x1="1722" y1="200" x2="1722" y2="115"/>
    <circle cx="1780" cy="185" r="22"/>
    <line x1="1802" y1="185" x2="1802" y2="100"/>
    <line x1="1722" y1="115" x2="1802" y2="100"/>
  </g>

  <!-- Small dot grid pattern -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#888888"/>
    </pattern>
    <rect x="1400" y="600" width="500" height="400" fill="url(#dots)"/>
    <rect x="0" y="0" width="400" height="300" fill="url(#dots)"/>
  </g>

  <!-- Brand badge -->
  <rect x="120" y="120" width="160" height="40" rx="20" fill="#111111"/>
  <text x="200" y="145" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle" letter-spacing="2">MUNO ART</text>

  <!-- Category tag -->
  <rect x="120" y="178" width="190" height="34" rx="17" fill="none" stroke="#111111" stroke-width="1.5"/>
  <text x="215" y="200" font-family="'Inter', sans-serif" font-size="12" fill="#111111" text-anchor="middle" letter-spacing="1">Brand Business Case</text>

  <!-- Main headline -->
  <text x="120" y="320" font-family="'Pretendard', 'Inter', sans-serif" font-size="72" font-weight="800" fill="#111111" letter-spacing="-2">VOC를 수익으로</text>
  <text x="120" y="410" font-family="'Pretendard', 'Inter', sans-serif" font-size="72" font-weight="800" fill="#111111" letter-spacing="-2">전환하다</text>
  <text x="120" y="490" font-family="'Pretendard', 'Inter', sans-serif" font-size="36" font-weight="300" fill="#555555" letter-spacing="-0.5">Data-Driven Art Commerce</text>

  <!-- Key metrics row -->
  <g transform="translate(120, 580)">
    <!-- Metric 1 -->
    <rect x="0" y="0" width="220" height="120" rx="12" fill="white" opacity="0.7"/>
    <text x="110" y="52" font-family="'Inter', sans-serif" font-size="40" font-weight="800" fill="#111111" text-anchor="middle">50.52%</text>
    <text x="110" y="76" font-family="'Inter', sans-serif" font-size="13" fill="#555555" text-anchor="middle">4년 평균 영업이익률</text>
    <text x="110" y="96" font-family="'Inter', sans-serif" font-size="11" fill="#888888" text-anchor="middle">Operating Profit</text>
    <!-- Metric 2 -->
    <rect x="240" y="0" width="220" height="120" rx="12" fill="white" opacity="0.7"/>
    <text x="350" y="52" font-family="'Inter', sans-serif" font-size="40" font-weight="800" fill="#37A3E2" text-anchor="middle">+72.5%</text>
    <text x="350" y="76" font-family="'Inter', sans-serif" font-size="13" fill="#555555" text-anchor="middle">연 매출 성장률</text>
    <text x="350" y="96" font-family="'Inter', sans-serif" font-size="11" fill="#888888" text-anchor="middle">Revenue Growth</text>
    <!-- Metric 3 -->
    <rect x="480" y="0" width="220" height="120" rx="12" fill="white" opacity="0.7"/>
    <text x="590" y="52" font-family="'Inter', sans-serif" font-size="40" font-weight="800" fill="#111111" text-anchor="middle">1,100+</text>
    <text x="590" y="76" font-family="'Inter', sans-serif" font-size="13" fill="#555555" text-anchor="middle">오가닉 반응</text>
    <text x="590" y="96" font-family="'Inter', sans-serif" font-size="11" fill="#888888" text-anchor="middle">Organic Reach (CAC=0)</text>
  </g>

  <!-- Period & role -->
  <text x="120" y="750" font-family="'Inter', sans-serif" font-size="16" fill="#888888" letter-spacing="1">2018.12 – 2023.12  ·  Founder &amp; Product Designer  ·  Solo</text>

  <!-- Right dangen_project illustration: simplified instrument silhouettes -->
  <g transform="translate(1100, 100)" opacity="0.12">
    <!-- Abstract violin shape -->
    <ellipse cx="300" cy="200" rx="80" ry="120" fill="none" stroke="#111111" stroke-width="3"/>
    <ellipse cx="300" cy="450" rx="80" ry="120" fill="none" stroke="#111111" stroke-width="3"/>
    <rect x="292" y="320" width="16" height="60" fill="#111111"/>
    <line x1="300" y1="80" x2="300" y2="0" stroke="#111111" stroke-width="3"/>
    <!-- Abstract trumpet -->
    <path d="M 600 300 Q 680 250 750 300 L 780 300 Q 820 300 820 340 L 820 380 Q 820 420 780 420 L 600 420 Z" fill="none" stroke="#111111" stroke-width="3"/>
    <circle cx="600" cy="360" r="50" fill="none" stroke="#111111" stroke-width="3"/>
    <line x1="600" y1="300" x2="500" y2="200" stroke="#111111" stroke-width="3"/>
    <!-- Abstract note -->
    <circle cx="500" cy="550" r="35" fill="none" stroke="#111111" stroke-width="3"/>
    <line x1="535" y1="550" x2="535" y2="430" stroke="#111111" stroke-width="3"/>
    <circle cx="620" cy="530" r="35" fill="none" stroke="#111111" stroke-width="3"/>
    <line x1="655" y1="530" x2="655" y2="410" stroke="#111111" stroke-width="3"/>
    <line x1="535" y1="430" x2="655" y2="410" stroke="#111111" stroke-width="3"/>
  </g>

  <!-- Right large graphic: profit circle -->
  <g transform="translate(1350, 300)">
    <circle cx="200" cy="200" r="180" fill="white" opacity="0.5"/>
    <circle cx="200" cy="200" r="180" fill="none" stroke="#E5E7EB" stroke-width="20"/>
    <!-- 50.52% arc: 50.52/100 * 2π = 3.175 rad -->
    <circle cx="200" cy="200" r="180"
      fill="none" stroke="#37A3E2" stroke-width="20"
      stroke-dasharray="572 1131"
      stroke-dashoffset="283"
      stroke-linecap="round"/>
    <text x="200" y="188" font-family="'Inter', sans-serif" font-size="52" font-weight="800" fill="#111111" text-anchor="middle">50.52%</text>
    <text x="200" y="218" font-family="'Inter', sans-serif" font-size="15" fill="#555555" text-anchor="middle">영업이익률</text>
    <text x="200" y="240" font-family="'Inter', sans-serif" font-size="13" fill="#888888" text-anchor="middle">Operating Margin</text>
  </g>
</svg>
